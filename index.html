<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공인중개사 학습계획 플래너</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --blue-light: #eff6ff;
      --amber: #f59e0b;
      --green: #10b981;
      --red: #ef4444;
      --purple: #7c3aed;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-700: #334155;
      --gray-900: #0f172a;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo',
                   'Noto Sans KR', sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: #fff;
      padding: 28px 20px 24px;
      text-align: center;
    }
    header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -.5px; }
    header p  { margin-top: 6px; opacity: .8; font-size: .95rem; }

    /* ── Layout ─────────────────────────────────────── */
    .wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── Steps 1+2 side-by-side on wide screens ─────── */
    .steps-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .steps-top .card { margin-bottom: 0; }
    @media (max-width: 600px) {
      .steps-top { grid-template-columns: 1fr; }
    }

    /* ── Info banner ────────────────────────────────── */
    .exam-banner {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: #fff;
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
    }
    .exam-banner .main-date { font-size: clamp(1rem, 3vw, 1.25rem); font-weight: 700; }
    .exam-banner .sub       { font-size: .8rem; opacity: .75; margin-bottom: 4px; }
    .exam-banner .dday      { margin-top: 14px; font-size: .9rem; opacity: .9;
                               width: 100%; border-top: 1px solid rgba(255,255,255,.2);
                               padding-top: 12px; }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .step-num {
      background: var(--blue);
      color: #fff;
      width: 26px; height: 26px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .78rem; font-weight: 800; flex-shrink: 0;
    }

    /* ── Option buttons (target) ─────────────────────── */
    .opt-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    @media (max-width: 400px) { .opt-group { grid-template-columns: 1fr; } }
    .opt-btn {
      padding: 14px 10px;
      border: 2px solid var(--gray-200);
      border-radius: 9px;
      background: #fff;
      color: var(--gray-700);
      cursor: pointer;
      font-size: .95rem;
      font-weight: 700;
      text-align: center;
      transition: border-color .15s, background .15s, color .15s;
    }
    .opt-btn:hover   { border-color: var(--blue); color: var(--blue); }
    .opt-btn.active  { border-color: var(--blue); background: var(--blue); color: #fff; }

    /* ── Hours button grid (체크박스형) ─────────────── */
    .hours-group {
      display: grid;
      grid-template-columns: repeat(8, minmax(56px, 120px));
      gap: 8px;
    }
    @media (max-width: 600px) { .hours-group { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 360px) { .hours-group { grid-template-columns: repeat(2, 1fr); } }
    .hours-btn {
      padding: 12px 6px;
      border: 2px solid var(--gray-200);
      border-radius: 9px;
      background: #fff;
      color: var(--gray-700);
      cursor: pointer;
      font-size: .95rem;
      font-weight: 700;
      text-align: center;
      transition: border-color .15s, background .15s, color .15s;
    }
    .hours-btn .sub  { font-size: .65rem; font-weight: 400; display: block; margin-top: 2px; color: var(--gray-400); }
    .hours-btn:hover { border-color: var(--blue); color: var(--blue); }
    .hours-btn.active { border-color: var(--blue); background: var(--blue); color: #fff; }
    .hours-btn.active .sub { color: rgba(255,255,255,.8); }

    /* ── Month grid ─────────────────────────────────── */
    .month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    @media (min-width: 721px) { .month-grid { grid-template-columns: repeat(4, 1fr); } }
    .month-btn {
      padding: 10px 6px;
      border: 2px solid var(--gray-200);
      border-radius: 9px;
      background: #fff;
      color: var(--gray-700);
      cursor: pointer;
      font-size: .88rem;
      font-weight: 600;
      text-align: center;
      transition: border-color .15s, background .15s, color .15s;
    }
    .month-btn:hover  { border-color: var(--blue); color: var(--blue); }
    .month-btn.active { border-color: var(--blue); background: var(--blue); color: #fff; }
    .month-btn .sub   { font-size: .65rem; font-weight: 400; display: block; margin-top: 2px; opacity: .8; }

    /* ── Hours hint ─────────────────────────────────── */
    .hours-hint  { margin-top: 12px; font-size: .84rem; padding: 8px 12px; border-radius: 8px; }
    .hours-hint.ok   { background: #f0fdf4; color: #15803d; }
    .hours-hint.warn { background: #fffbeb; color: #b45309; }

    /* ── Generate button ────────────────────────────── */
    .btn-gen {
      width: 100%; padding: 16px;
      background: var(--blue);
      color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer; letter-spacing: .3px;
      transition: background .15s, transform .1s;
      margin-bottom: 32px;
    }
    .btn-gen:hover   { background: var(--blue-dark); }
    .btn-gen:active  { transform: scale(.98); }
    .btn-gen:disabled { background: var(--gray-400); cursor: not-allowed; transform: none; }

    /* ── Results header ─────────────────────────────── */
    .results-header {
      font-size: 1.1rem; font-weight: 700; color: var(--gray-700);
      margin-bottom: 16px; padding-bottom: 10px;
      border-bottom: 2px solid var(--gray-200);
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Stat cards ─────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
    }
    @media (max-width: 500px) {
      .stat-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .stat-item {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }
    .stat-item .val  { font-size: clamp(1.1rem, 2.2vw, 1.7rem); font-weight: 800; color: var(--blue); }
    .stat-item .lbl  { font-size: .72rem; color: var(--gray-500); margin-top: 3px; }

    /* ── Coverage bar ────────────────────────────────── */
    .coverage-wrap {
      margin-top: 18px; padding: 14px 16px;
      background: var(--blue-light); border-radius: 10px;
      border: 1px solid #bfdbfe;
    }
    .coverage-label { font-size: .88rem; color: #1e40af; font-weight: 600; margin-bottom: 8px; }
    .bar-bg { background: #bfdbfe; border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; background: var(--blue); transition: width .6s; }

    /* ── Curriculum roadmap (7-column grid, always 1 row) ─ */
    .rm-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .rm-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 4px;
      min-width: 560px;
    }
    .rm-cell {
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      padding: 10px 5px 8px;
      border-radius: 10px; border: 2px solid var(--gray-200);
      text-align: center; gap: 4px;
      background: var(--gray-100);
      position: relative;
    }
    .rm-cell.included { border-color: var(--blue); background: var(--blue-light); }
    .rm-cell.partial  { border-color: var(--blue); background: var(--blue-light); }
    .rm-cell.skipped  { opacity: .4; }
    .rm-cell:not(:last-child)::after {
      content: '›';
      position: absolute;
      right: -10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; text-align: center;
      font-size: 1.3rem; font-weight: 700; line-height: 1;
      color: var(--gray-400); z-index: 2; pointer-events: none;
    }
    .rm-cell.included:not(:last-child)::after { color: var(--blue); }
    .rm-cell.partial:not(:last-child)::after  { color: var(--blue); }
    .rm-seq  { font-size: .6rem; font-weight: 800; color: var(--gray-400); }
    .rm-cell.included .rm-seq { color: var(--blue); }
    .rm-cell.partial  .rm-seq { color: var(--blue); }
    .rm-cell.done     .rm-seq { color: var(--green); }
    .rm-name { font-size: .7rem; font-weight: 700; line-height: 1.3; overflow-wrap: anywhere; width: 100%; }
    .rm-cnt  { font-size: .62rem; color: var(--gray-500); }
    .rm-icon { font-size: .88rem; }
    .rm-stlbl { font-size: .62rem; font-weight: 700; }

    /* ── Progress check ─────────────────────────────── */
    .rm-cell.done {
      border-color: var(--green) !important;
      background: #f0fdf4 !important;
    }
    .rm-cell.done:not(:last-child)::after { color: var(--green) !important; }
    .rm-chk {
      margin-top: 5px; width: 100%;
      padding: 6px 2px;
      border-radius: 8px;
      border: 2px solid currentColor;
      font-size: .68rem; font-weight: 800;
      cursor: pointer;
      transition: all .15s; line-height: 1.3;
      display: flex; align-items: center; justify-content: center; gap: 3px;
    }
    .rm-cell.included .rm-chk { color: #fff; background: var(--blue); border-color: var(--blue); }
    .rm-cell.partial  .rm-chk { color: #fff; background: var(--blue); border-color: var(--blue); }
    .rm-cell.done     .rm-chk { color: #fff; background: var(--green);  border-color: var(--green); }
    .rm-chk:hover { filter: brightness(.93); transform: scale(1.03); }

    /* ── Progress hint ───────────────────────────────── */
    .prog-hint {
      margin-top: 14px; padding: 12px 16px;
      background: linear-gradient(135deg, #eff6ff, #f0fdf4);
      border: 1px solid #bfdbfe; border-radius: 10px;
      font-size: .84rem; color: var(--gray-700); text-align: center; line-height: 1.7;
    }
    .prog-hint strong { color: var(--blue); }


    .prog-bar-wrap {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px; padding: 10px 14px;
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: 9px; gap: 12px;
    }
    .prog-dots { display: flex; gap: 5px; flex-wrap: nowrap; }
    .prog-dot  {
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--gray-200); flex-shrink: 0;
    }
    .prog-dot.pd-done    { background: var(--green); }
    .prog-dot.pd-active  { background: var(--blue); }
    .prog-dot.pd-partial { background: var(--amber); }
    .prog-dot.pd-skip    { background: var(--gray-200); opacity: .4; }
    .prog-txt { font-size: .85rem; font-weight: 700; white-space: nowrap; }
    .prog-reset {
      padding: 5px 12px; border: 1px solid var(--gray-200);
      border-radius: 6px; background: #fff;
      font-size: .75rem; color: var(--gray-500); cursor: pointer; white-space: nowrap;
    }
    .prog-reset:hover { border-color: var(--red); color: var(--red); }

    /* ── Study path summary (always 1 row) ─────────────── */
    .study-path {
      margin-top: 16px; padding: 14px 16px;
      background: #f0fdf4; border: 1px solid #86efac; border-radius: 10px;
    }
    .study-path .sp-label {
      font-size: .82rem; font-weight: 700; color: #15803d; margin-bottom: 10px;
    }
    .sp-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .sp-items {
      display: grid;
      gap: 6px;
      /* grid-template-columns set dynamically in JS */
    }
    .sp-tag {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 6px; border-radius: 10px;
      border: 2px solid #86efac; background: #dcfce7; color: #166534;
      font-size: .78rem; font-weight: 700;
      text-align: center; gap: 3px;
      position: relative;
    }
    .sp-tag:not(:last-child)::after {
      content: '›';
      position: absolute;
      right: -10px; top: 50%;
      transform: translateY(-50%);
      width: 14px; text-align: center;
      font-size: 1.3rem; font-weight: 700; line-height: 1;
      color: #16a34a; z-index: 2; pointer-events: none;
    }
    .sp-tag .sp-lec { font-size: .65rem; font-weight: 400; opacity: .8; }
    .sp-tag.partial-tag { border-color: #86efac; background: #dcfce7; color: #166534; }
    .sp-tag.partial-tag:not(:last-child)::after { color: #16a34a; }
    .sp-arr { display: none; }

    /* ── Skip note ──────────────────────────────────── */
    .skip-note {
      margin-top: 10px; padding: 10px 14px;
      background: var(--gray-50); border: 1px solid var(--gray-200);
      border-radius: 8px; font-size: .8rem; color: var(--gray-500);
    }

    /* ── Weekly table ────────────────────────────────── */
    .week-scroll { overflow-x: auto; }
    table.week { width: 100%; border-collapse: collapse; font-size: .83rem; }
    table.week th {
      background: var(--blue); color: #fff;
      padding: 9px 6px; text-align: center;
      font-weight: 700;
    }
    table.week th:first-child { background: #1e3a8a; }
    table.week th.sun-th { background: #5b21b6; }
    table.week td {
      padding: 10px 6px; text-align: center;
      border: 1px solid var(--gray-200);
    }
    table.week td.sun-td { background: #f5f3ff; }
    table.week tr:nth-child(even) td { background: var(--gray-50); }
    table.week tr:nth-child(even) td.sun-td { background: #ede9fe; }
    .stag {
      display: inline-block; padding: 3px 8px; border-radius: 20px;
      font-size: .72rem; font-weight: 700; white-space: nowrap;
    }
    .s0  { background: #dbeafe; color: #1d4ed8; }
    .s1  { background: #fce7f3; color: #9d174d; }
    .s2  { background: #dcfce7; color: #166534; }
    .s3  { background: #fef3c7; color: #92400e; }
    .s4  { background: #ede9fe; color: #6b21a8; }
    .s5  { background: #ffedd5; color: #c2410c; }
    .sun-1 { background: #fef3c7; color: #92400e; }
    .sun-2 { background: #ede9fe; color: #6b21a8; }
    .week-note {
      margin-top: 10px; font-size: .8rem; color: var(--gray-500);
      background: var(--gray-50); border-radius: 8px; padding: 8px 12px;
    }
    .sun-phase-box {
      margin-top: 10px; padding: 10px 14px;
      background: #faf5ff; border: 1px solid #ddd6fe;
      border-radius: 8px; font-size: .82rem;
    }
    .sun-phase-box strong { color: var(--purple); }
    .phase-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .phase-tag  { padding: 3px 10px; border-radius: 12px; font-size: .78rem; font-weight: 600; }
    .phase-tag-1 { background: #fef3c7; color: #92400e; }
    .phase-tag-2 { background: #ede9fe; color: #6b21a8; }

    /* ── Gantt roadmap ──────────────────────────────── */
    .gantt-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .gantt-inner { min-width: 520px; }
    .gantt-header { display: flex; margin-bottom: 2px; }
    .gantt-label-col-h { width: 104px; flex-shrink: 0; }
    .gantt-month-headers { flex: 1; display: grid; }
    .gantt-month-h {
      text-align: center; font-size: .72rem; font-weight: 700;
      color: var(--gray-500); padding: 4px 0;
      border-left: 1px solid var(--gray-200);
    }
    .gantt-body { display: flex; }
    .gantt-labels { width: 104px; flex-shrink: 0; }
    .gantt-label-row {
      display: flex; align-items: center;
      font-size: .68rem; color: var(--gray-500); font-weight: 600;
      padding-right: 8px; line-height: 1.25;
    }
    .gantt-timeline-area { flex: 1; position: relative; }
    .gantt-gridlines {
      position: absolute; inset: 0;
      display: grid; pointer-events: none;
    }
    .gantt-gridline { border-left: 1px solid var(--gray-200); }
    .gantt-gridline:first-child { border-left: none; }
    .gantt-bars { position: relative; }
    .gantt-bar {
      position: absolute;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      cursor: pointer;
      overflow: hidden;
      transition: filter .15s, box-shadow .15s;
    }
    .gantt-bar:hover { filter: brightness(1.12); box-shadow: 0 4px 14px rgba(0,0,0,.25); }
    .gantt-bar span {
      color: #fff; font-size: .68rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-align: center; text-shadow: 0 1px 2px rgba(0,0,0,.18);
    }
    #gantt-tooltip {
      position: fixed; z-index: 9999;
      background: #1e293b; color: #fff;
      padding: 6px 13px; border-radius: 8px;
      font-size: .78rem; font-weight: 600;
      pointer-events: none; display: none;
      box-shadow: 0 4px 14px rgba(0,0,0,.3);
      white-space: nowrap;
    }

    /* ── Monthly grid ────────────────────────────────── */
    .mo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .mo-card { border: 1px solid var(--gray-200); border-radius: 10px; overflow: hidden; }
    .mo-head {
      background: var(--blue); color: #fff;
      padding: 9px 14px; font-weight: 700; font-size: .9rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .mo-head.exam-head { background: var(--red); }
    .mo-body { padding: 12px 14px; }
    .mo-meta { font-size: .76rem; color: var(--gray-500); margin-bottom: 4px; }
    .mo-sun  { font-size: .72rem; margin-bottom: 8px; }
    .mo-sun.phase1 { color: #92400e; }
    .mo-sun.phase2 { color: #6b21a8; }
    .mo-item { margin-top: 7px; }
    .mo-item-label {
      display: flex; justify-content: space-between;
      font-size: .8rem; margin-bottom: 3px;
    }
    .mo-item-label span:last-child { color: var(--blue); font-weight: 700; }
    .pb-bg { background: var(--gray-200); border-radius: 3px; height: 6px; overflow: hidden; }
    .pb { height: 100%; border-radius: 3px; background: var(--blue); }
    .mo-done { color: var(--green); font-weight: 600; font-size: .83rem; }

    /* ── My plan button ─────────────────────────────── */
    .my-plan-btn {
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(255,255,255,.75);
      border-radius: 12px;
      padding: 10px 18px;
      color: #fff;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
      align-self: center;
      min-width: 130px;
    }
    .my-plan-btn:hover { background: rgba(255,255,255,.32); transform: scale(1.04); }
    .mpb-tag {
      display: inline-block; font-size: .62rem; font-weight: 700;
      letter-spacing: .4px; background: rgba(255,255,255,.25);
      border-radius: 10px; padding: 2px 8px; margin-bottom: 6px;
    }
    .mpb-val    { font-size: .92rem; font-weight: 800; margin-bottom: 4px; }
    .mpb-action { font-size: .7rem; opacity: .85; }

    /* ── Hidden ─────────────────────────────────────── */
    #results { display: none; }
  </style>
</head>
<body>

<header>
  <h1>공인중개사 학습계획 플래너</h1>
  <p>나에게 맞는 최적의 학습계획을 자동으로 설계해 드립니다</p>
</header>

<div class="wrap">

  <!-- Exam info banner -->
  <div class="exam-banner">
    <div>

/* ═══════════════════ CALC ════════════════════ */
// 1강 ≈ 60분 → 하루 N시간 = 약 N강 (학습 시간을 넘지 않음)
function lecturesPerDay(h) { return Math.max(1, h - 1); }

// 한 달의 전체 날수 (일요일 포함, 모든 날 학습)
function allDaysInMonth(month) {
  return new Date(2026, month, 0).getDate();
}

// 한 달의 강의 수강 가능일 (월~토, 일요일 제외)
function lectureDaysInMonth(month) {
  return Math.round(allDaysInMonth(month) * 6 / 7);
}

function getLecturesForTarget(c, target) {
  if (target === '1차')  return c.l1;
  if (target === '2차')  return c.l2;
  return c.l1 + c.l2;
}

function buildPlan() {
  const now        = new Date();
  const curMonth   = now.getMonth() + 1;
  const startDate  = S.month <= curMonth
    ? new Date(now.getFullYear(), now.getMonth(), now.getDate())
    : new Date(2026, S.month - 1, 1);
  const totalDays  = Math.ceil((EXAM_DATE - startDate) / 864e5);
  const lpd        = lecturesPerDay(S.hours);

  // 월별 데이터를 먼저 계산 → capacity를 월별 합산으로 구해 표시값과 일치
  const months = [];
  for (let m = S.month; m <= 10; m++) {
    const sd  = allDaysInMonth(m);
    const ld  = lectureDaysInMonth(m);
    const sun = sd - ld;
    const lec = ld * lpd;
    months.push({ m, sd, ld, sun, lec });
  }
  const lecDays = months.reduce((s, mo) => s + mo.ld, 0);
  const capacity = months.reduce((s, mo) => s + mo.lec, 0); // 월별 합산 = 표시값과 동일

  const totalNeeded = CURRS.reduce((s, c) => s + getLecturesForTarget(c, S.target), 0);

  // 우선순위 기준으로 커리큘럼 포함 여부 결정
  const sorted = CURRS.map(c => ({
    ...c,
    needed: getLecturesForTarget(c, S.target),
  })).sort((a, b) => a.pri - b.pri);

  let rem = capacity;
  sorted.forEach(c => {
    if (rem >= c.needed) {
      c.status = 'full'; c.effective = c.needed; rem -= c.needed;
    } else if (rem * 2 >= c.needed) {
      c.status = 'partial'; c.effective = rem; c.pct = Math.round(rem / c.needed * 100); rem = 0;
    } else {
      c.status = 'skipped'; c.effective = 0;
    }
  });

  const result = CURRS.map(orig => sorted.find(c => c.seq === orig.seq));

  const coveragePct = Math.min(100, Math.round(capacity / totalNeeded * 100));
  const fullCount   = result.filter(c => c.status === 'full' || c.status === 'partial').length;

  // 용량이 남을 경우 커리큘럼을 10월까지 고르게 배분
  // (매달 contentLec = 실제 커리큘럼 진도 단위, lec = 실제 수강 강의수)
  const effectiveTotal = result
    .filter(c => c.status !== 'skipped')
    .reduce((s, c) => s + c.effective, 0);
  const totalCap = months.reduce((s, mo) => s + mo.lec, 0);
  const contentRatio = (effectiveTotal > 0 && effectiveTotal < totalCap)
    ? effectiveTotal / totalCap : 1;
  months.forEach(mo => {
    mo.contentLec = Math.max(1, Math.round(mo.lec * contentRatio));
  });

  return { totalDays, lecDays, capacity, totalNeeded, coveragePct, fullCount, result, months, lpd };
}

/* ═══════════════════ RENDER ══════════════════ */
function generate() {

/* ── Gantt chart ────────────────────────────── */
const GANTT_COLORS = [
  'linear-gradient(90deg,#38bdf8,#0ea5e9)',   // sky
  'linear-gradient(90deg,#60a5fa,#2563eb)',   // blue
  'linear-gradient(90deg,#818cf8,#4f46e5)',   // indigo
  'linear-gradient(90deg,#a78bfa,#7c3aed)',   // violet
  'linear-gradient(90deg,#34d399,#059669)',   // emerald
  'linear-gradient(90deg,#fb923c,#ea580c)',   // orange
  'linear-gradient(90deg,#f472b6,#db2777)',   // pink
];

function renderGantt(p) {
  const { result, months } = p;
  const active = result
    .filter(c => c.status !== 'skipped')
    .map(c => ({
      name: c.name.replace(/<br>/g, ''),
      lec:  c.effective,
    }));

  if (!active.length) { document.getElementById('gantt-chart').innerHTML = ''; return; }

  const monthNums = months.map(mo => mo.m);
  const numM      = monthNums.length;
  const ROW_H     = 46;

  // 바 위치 계산 (커리큘럼별 시작/끝 월 컬럼 소수점)
  const bars = [];
  let localPos = 0;
  active.forEach((curr, idx) => {
    const cS = localPos, cE = localPos + curr.lec;
    let startCol = null, endCol = null;
    let gPos = 0;
    months.forEach((mo, mi) => {
      const mS = gPos, mE = gPos + mo.contentLec;
      if (cE > mS && cS < mE) {
        if (startCol === null)
          startCol = mi + (Math.max(cS, mS) - mS) / mo.contentLec;
        endCol = mi + (Math.min(cE, mE) - mS) / mo.contentLec;
      }
      gPos += mo.contentLec;
    });
    bars.push({
      name:     curr.name,
      leftPct:  (startCol ?? 0) / numM * 100,
      widthPct: ((endCol ?? numM) - (startCol ?? 0)) / numM * 100,
      color:    GANTT_COLORS[idx % GANTT_COLORS.length],
    });
    localPos += curr.lec;
  });

  const totalH = bars.length * ROW_H;
  let html = `<div class="gantt-wrap"><div class="gantt-inner">`;

  // 월 헤더
  html += `<div class="gantt-header">
    <div class="gantt-label-col-h"></div>
    <div class="gantt-month-headers" style="grid-template-columns:repeat(${numM},1fr);">`;
  monthNums.forEach(m => { html += `<div class="gantt-month-h">${m}월</div>`; });
  html += `</div></div><div class="gantt-body">`;

  // 레이블 열
  html += `<div class="gantt-labels">`;
  bars.forEach(b => {
    html += `<div class="gantt-label-row" style="height:${ROW_H}px;">${b.name}</div>`;
  });
  html += `</div>`;

  // 타임라인
  html += `<div class="gantt-timeline-area" style="height:${totalH}px;">`;
  html += `<div class="gantt-gridlines" style="grid-template-columns:repeat(${numM},1fr);">`;
  monthNums.forEach(() => { html += `<div class="gantt-gridline"></div>`; });
  html += `</div><div class="gantt-bars" style="height:${totalH}px;">`;
  bars.forEach((b, i) => {
    html += `<div class="gantt-bar" data-name="${b.name}" style="
      left:${b.leftPct.toFixed(2)}%; width:${b.widthPct.toFixed(2)}%;
      top:${i * ROW_H + 8}px; height:${ROW_H - 16}px;
      background:${b.color};">
      <span>${b.name}</span>
    </div>`;
  });
  html += `</div></div></div></div></div>`;

  document.getElementById('gantt-chart').innerHTML = html;

  // 툴팁 설정
  let tip = document.getElementById('gantt-tooltip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'gantt-tooltip';
    document.body.appendChild(tip);
  }
  const barsEl = document.querySelector('#gantt-chart .gantt-bars');
  barsEl.addEventListener('mouseover', e => {
    const bar = e.target.closest('.gantt-bar');
    if (bar) { tip.textContent = bar.dataset.name; tip.style.display = 'block'; }
  });
  barsEl.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 40) + 'px';
  });
  barsEl.addEventListener('mouseout', e => {
    if (!e.relatedTarget?.closest('.gantt-bar')) tip.style.display = 'none';
  });
}

/* ── Stats ──────────────────────────────────── */
function renderStats(p) {
  const { totalDays, capacity, totalNeeded, coveragePct, fullCount, lpd } = p;
  const hDisp = S.hours >= 9 ? '8h+' : S.hours + 'h';
  document.getElementById('stat-grid').innerHTML = [
    { val: totalDays + '일',      lbl: '총 학습 기간'       },
    { val: hDisp,                 lbl: '하루 학습 시간'      },
    { val: '약 ' + lpd + '강',    lbl: '하루 수강<br>강의수'   },
    { val: Math.min(capacity, totalNeeded) + '강', lbl: '수강 가능<br>총 강의'  },
    { val: totalNeeded + '강',       lbl: '전체 커리큘럼 강의'   },
    { val: fullCount + '/7',         lbl: '완주 가능<br>과정수'  },
  ].map(s =>
    `<div class="stat-item"><div class="val">${s.val}</div><div class="lbl">${s.lbl}</div></div>`
  ).join('');

}

    target: S.target, month: S.month, hours: S.hours

function loadMyPlan() {
  try { return JSON.parse(localStorage.getItem(MY_PLAN_KEY)); }
  catch { return null; }
}

function updateMyPlanBtn() {
  const saved = loadMyPlan();
  const btn = document.getElementById('my-plan-btn');
  if (!btn) return;
  if (!saved) { btn.style.display = 'none'; return; }
  const tLbl = saved.target === '1+2차' ? '동차' : saved.target;
  const hLbl = saved.hours >= 9 ? '8시간+' : saved.hours + '시간';
  btn.style.display = '';
  btn.innerHTML = `
    <div class="mpb-tag">📋 나의 학습계획</div>
    <div class="mpb-val">${tLbl} · ${saved.month}월 · ${hLbl}</div>
    <div class="mpb-action">▶ 바로 보기</div>`;
  positionMyPlanBtn();
}

function goMyPlan() {
  const saved = loadMyPlan();
  if (!saved) return;
  document.querySelectorAll('.opt-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.v === saved.target));
  S.target = saved.target;
  document.querySelectorAll('.month-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.v === saved.month));
  S.month = saved.month;
  document.querySelectorAll('.hours-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.v === saved.hours));
  S.hours = saved.hours;
  updateHoursHint();
  generate();
}

/* ── Progress localStorage helpers ─────────── */
function progressKey() {
  return `gjp_${S.target}_${S.month}_${S.hours}`;
}
function getProgress() {
  try { return new Set(JSON.parse(localStorage.getItem(progressKey()) || '[]')); }
  catch { return new Set(); }
}
function saveProgress(s) {
  localStorage.setItem(progressKey(), JSON.stringify([...s]));
}
function toggleDone(seq) {
  const d = getProgress();
  d.has(seq) ? d.delete(seq) : d.add(seq);
  saveProgress(d);
  renderCurriculum(window._plan);
}
function resetProgress() {
  localStorage.removeItem(progressKey());
  renderCurriculum(window._plan);
}

/* ── Curriculum roadmap ─────────────────────── */
function renderCurriculum(p) {
  const { result } = p;
  const done = getProgress();
  const active = result.filter(c => c.status !== 'skipped');
  const doneCount = active.filter(c => done.has(c.seq)).length;
  const allDone = active.length > 0 && doneCount === active.length;

  // 진도 요약 바
  const dots = result.map(c => {
    if (c.status === 'skipped')           return `<div class="prog-dot pd-skip"></div>`;
    if (done.has(c.seq))                  return `<div class="prog-dot pd-done"></div>`;
    if (c.status === 'partial')           return `<div class="prog-dot pd-partial"></div>`;
    return `<div class="prog-dot pd-active"></div>`;
  }).join('');

  const progColor = allDone ? 'var(--green)' : 'var(--gray-700)';
  const progMsg   = allDone ? '🎉 전 과정 완료!' : `${doneCount} / ${active.length} 완료`;
  const progHtml  = `<div class="prog-bar-wrap">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="prog-dots">${dots}</div>
      <span class="prog-txt" style="color:${progColor};">${progMsg}</span>
    </div>
    <button class="prog-reset" onclick="resetProgress()">초기화</button>
  </div>`;

  // 1. 로드맵 그리드 (7단계 전체, 커리큘럼 순서 — 항상 한 줄 표시)
  let flowHtml = '<div class="rm-outer"><div class="rm-grid">';
  result.forEach(c => {
    const isDone  = done.has(c.seq) && c.status !== 'skipped';
    const baseCls = c.status === 'full' ? 'included' : c.status === 'partial' ? 'partial' : 'skipped';
    const cls     = isDone ? `${baseCls} done` : baseCls;
    const icon    = isDone ? '✅' : c.status === 'full' ? '⬜' : c.status === 'partial' ? '⚡' : '❌';
    const sLbl    = isDone ? '완료!' : c.status === 'full' ? '완주 가능' : c.status === 'partial' ? `${c.pct}%` : '시간 부족';
    const sClr    = isDone ? 'var(--green)' : baseCls === 'skipped' ? 'var(--gray-400)' : 'var(--blue)';
    const chkBtn  = c.status !== 'skipped'
      ? `<button class="rm-chk" onclick="toggleDone(${c.seq})">${isDone ? '☑ 완료됨' : '☐ 완료 체크'}</button>` : '';
    flowHtml += `
      <div class="rm-cell ${cls}">
        <div class="rm-seq">STEP ${c.seq}</div>
        <div class="rm-name">${c.name}</div>
        <div class="rm-cnt">${c.needed}강</div>
        <div class="rm-icon">${icon}</div>
        <div class="rm-stlbl" style="color:${sClr};">${sLbl}</div>
        ${chkBtn}
      </div>`;
  });
  flowHtml += '</div></div>';

  // 2. 실제 학습 경로 (포함된 것만, 커리큘럼 순서 — 항상 한 줄 표시)
  const included = result.filter(c => c.status !== 'skipped');
  const skipped  = result.filter(c => c.status === 'skipped');
  const spCols   = included.length;
  const spMinW   = spCols * 90;

  let pathHtml = `<div class="study-path">
    <div class="sp-label">📖 실제 학습 순서 (커리큘럼 순서에 따라 순차 진행)</div>
    <div class="sp-scroll">
    <div class="sp-items" style="grid-template-columns:repeat(${spCols},1fr);min-width:${spMinW}px;">`;
  included.forEach(c => {
    pathHtml += `<div class="sp-tag ${c.status === 'partial' ? 'partial-tag' : ''}">
      ${c.name}
      <span class="sp-lec">${c.status === 'partial' ? c.effective + '/' : ''}${c.needed}강</span>
    </div>`;
  });
  pathHtml += '</div></div></div>';

  // 3. 생략 과정 안내
  let skipHtml = '';
  if (skipped.length > 0) {
    skipHtml = `<div class="skip-note">
      ⏭️ <strong>생략 과정 (시간 부족):</strong> ${skipped.map(c => c.name.replace(/<br>/g, ' ')).join(', ')}<br>
      학습 시작 월을 앞당기거나 하루 학습 시간을 늘리면 추가로 포함됩니다.
    </div>`;
  }

  const hintHtml = `<div class="prog-hint">
    📖 각 커리큘럼을 완강하셨나요? <strong>☐ 완료 체크</strong> 버튼을 눌러 나만의 합격 여정을 기록해보세요!<br>
    하나씩 체크할 때마다 합격이 한 걸음 더 가까워집니다. 꾸준히 함께 가요 💪
  </div>`;

  document.getElementById('curr-roadmap').innerHTML = progHtml + flowHtml + hintHtml + pathHtml + skipHtml;
}

/* ── Weekly schedule ────────────────────────── */
function renderWeekly(p) {
  const subjs = SUBJECTS[S.target];
  const n     = subjs.length;
  const weekdays = ['월', '화', '수', '목', '금', '토'];  // 월~토 6일
  const allDays  = [...weekdays, '일'];                    // + 일요일

  // 시작 커리큘럼 안내
  const firstCurr = p.result.find(c => c.status !== 'skipped');
  const currNote  = firstCurr
    ? `<div style="margin-bottom:14px;padding:10px 14px;background:var(--blue-light);
         border:1px solid #bfdbfe;border-radius:8px;font-size:.84rem;color:#1e40af;">
         📌 <strong>학습 시작 커리큘럼:</strong> ${firstCurr.name} (${firstCurr.needed}강)
         — 아래 요일 패턴으로 과목을 순환하며 수강합니다.
       </div>`
    : '';

  // 주간 패턴 구성
  const buildWeek = (offset) =>
    allDays.map((d, i) => {
      if (i === 6) return { d, isReview: true };
      const idx = (i + offset) % n;
      return { d, subj: subjs[idx], cls: `s${idx}` };
    });

  const rows = [{ label: n === 4 ? 'A주' : '매주', schedule: buildWeek(0) }];
  if (n === 4) rows.push({ label: 'B주', schedule: buildWeek(2) });

  // 테이블 HTML
  let html = currNote;
  html += `<div class="week-scroll"><table class="week"><thead><tr><th>주차</th>`;
  allDays.forEach(d => {
    html += d === '일'
      ? `<th class="sun-th">일 (복습)</th>`
      : `<th>${d}</th>`;
  });
  html += `</tr></thead><tbody>`;

  rows.forEach(row => {
    html += `<tr>
      <td style="font-weight:700;font-size:.8rem;color:var(--blue);white-space:nowrap;">${row.label}</td>`;
    row.schedule.forEach(slot => {
      if (slot.isReview) {
        if (S.target === '1차') {
          html += `<td class="sun-td">
            <span class="stag sun-2">부족과목</span>
          </td>`;
        } else {
          html += `<td class="sun-td">
            <span class="stag sun-1" style="display:block;margin-bottom:2px;">~5월</span>
            <span class="stag sun-2">6월~</span>
          </td>`;
        }
      } else {
        const short = SHORT[slot.subj] || slot.subj;
        html += `<td>
          <span class="stag ${slot.cls}">${short}</span>
          <br><span style="font-size:.7rem;color:var(--gray-400);">${S.hours}h</span>
        </td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;

  // 일요일 복습 설명 (목표에 따라 구분)
  if (S.target === '1차') {
    html += `<div class="sun-phase-box">
      <strong>📚 일요일 복습 방식</strong>
      <div class="phase-tags">
        <span class="phase-tag phase-tag-2">매주 일요일: 부족한 과목 집중 복습</span>
      </div>
    </div>`;
  } else {
    html += `<div class="sun-phase-box">
      <strong>📚 일요일 복습 방식</strong>
      <div class="phase-tags">
        <span class="phase-tag phase-tag-1">1월~5월: 1차 과목 복습 (부동산학개론·민법)</span>
        <span class="phase-tag phase-tag-2">6월~10월: 부족한 과목 집중 복습</span>
      </div>
    </div>`;
  }

  const noteText = n === 4
    ? 'A·B주를 격주로 반복합니다. 4과목이 2주 동안 각 3일씩 균등 배분됩니다.'
    : n === 2
    ? '두 과목이 3일씩 균등 배분됩니다.'
    : '6과목이 1일씩 배분됩니다.';
  html += `<div class="week-note">※ ${noteText} 동일한 커리큘럼을 해당 과목 완강 시까지 반복합니다.</div>`;

  document.getElementById('week-table').innerHTML = html;
}

/* ── Monthly progress ───────────────────────── */
function renderMonthly(p) {
  const { result, months, lpd } = p;

  // 수강하는 커리큘럼 (커리큘럼 순서)
  const active = result
    .filter(c => c.status !== 'skipped')
    .map(c => ({ name: c.name, lec: c.effective }));

  let globalPos = 0;
  let html = '';

  months.forEach(({ m, sd, ld, sun, lec, contentLec }) => {
    const mStart = globalPos;
    const mEnd   = globalPos + contentLec;

    // 이번 달에 해당하는 커리큘럼 계산
    let localPos = 0;
    const items  = [];
    for (const a of active) {
      const cS = localPos;
      const cE = localPos + a.lec;
      if (cE > mStart && cS < mEnd) {
        const ov  = Math.min(cE, mEnd) - Math.max(cS, mStart);
        const pct = Math.round(ov / contentLec * 100);
        items.push({ name: a.name, pct });
      }
      localPos += a.lec;
    }

    const isExam   = m === 10;
    // 1차 목표는 월 구분 없이 항상 부족과목 복습
    const isPhase1 = S.target !== '1차' && m <= 5;
    const mainCurr = items.length > 0 ? items.reduce((a, b) => a.pct >= b.pct ? a : b) : null;
    const mainTag  = mainCurr
      ? `<span style="font-size:.7rem;background:rgba(255,255,255,.25);padding:2px 8px;
           border-radius:10px;margin-left:6px;">${mainCurr.name.replace(/<br>/g, ' ')}</span>` : '';

    html += `<div class="mo-card">
      <div class="${isExam ? 'mo-head exam-head' : 'mo-head'}">
        <span>${m}월${isExam ? ' 🎯' : ''}${mainTag}</span>
        <span style="font-size:.75rem;opacity:.8;">${isExam ? '시험일 10.31' : `학습 ${sd}일`}</span>
      </div>
      <div class="mo-body">
        <div class="mo-meta">하루 ${lpd}강 × ${ld}일(월~토) = 약 ${lec}강</div>
        <div class="mo-sun ${isPhase1 ? 'phase1' : 'phase2'}">
          📚 일요일 ${sun}회: ${isPhase1 ? '1차 과목 복습' : '부족한 과목 복습'}
        </div>`;

    if (items.length > 0) {
      items.forEach(it => {
        html += `<div class="mo-item">
          <div class="mo-item-label"><span>${it.name.replace(/<br>/g, ' ')}</span><span>${it.pct}%</span></div>
          <div class="pb-bg"><div class="pb" style="width:${it.pct}%"></div></div>
        </div>`;
      });
    } else {
      html += `<div class="mo-done">✅ 전 커리큘럼 완료 · 최종 점검 기간</div>`;
    }

    html += `</div></div>`;
    globalPos += contentLec;
  });

  document.getElementById('mo-grid').innerHTML = html;
}

/* ── PDF 다운로드 (A4 1장, html2canvas 단일 캡처 → 한글 깨짐 없음) ── */
async function downloadPDF(btn) {
  const orig = btn.innerHTML;
  btn.innerHTML = '⏳ 생성 중...';
  btn.disabled = true;

  try {
    const tLbl = { '1차': '1차', '2차': '2차', '1+2차': '동차' }[S.target] || S.target;
    const hLbl = S.hours >= 9 ? '8시간+' : S.hours + '시간';

    // ── 임시 인쇄용 컨테이너 생성 ──
    const wrap = document.createElement('div');
    wrap.style.cssText = `
      position:fixed; left:-9999px; top:0;
      width:780px; background:#fff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    `;

    // 제목 배너
    wrap.innerHTML = `
      <div style="background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;
                  padding:14px 24px;text-align:center;">
        <div style="font-size:17px;font-weight:800;margin-bottom:3px;">공인중개사 학습계획</div>
        <div style="font-size:12px;opacity:.85;">${tLbl} &nbsp;·&nbsp; ${S.month}월 시작 &nbsp;·&nbsp; 하루 ${hLbl}</div>
      </div>`;

    // 로드맵 섹션 (gantt 복제 + 커리큘럼명 강제 표기)
    const ganttClone = document.getElementById('gantt-chart').cloneNode(true);

    // 바 안 텍스트: overflow 해제 + 바 외부에 이름 라벨 추가
    ganttClone.querySelectorAll('.gantt-bar').forEach(bar => {
      const name = bar.dataset.name || '';
      bar.style.overflow = 'visible';
      // 바 위에 이름 라벨 (항상 표시)
      const lbl = document.createElement('div');
      lbl.style.cssText = `
        position:absolute; left:0; right:0;
        bottom:calc(100% + 2px);
        font-size:9.5px; font-weight:700; color:#1e293b;
        white-space:nowrap; text-align:center;
        line-height:1.2; pointer-events:none;
      `;
      lbl.textContent = name;
      bar.style.position = 'absolute'; // 이미 absolute이지만 명시
      bar.appendChild(lbl);
      // 바 내부 span 숨기기 (라벨로 대체)
      const span = bar.querySelector('span');
      if (span) span.style.display = 'none';
    });
    // 레이블 열 폰트 강화
    ganttClone.querySelectorAll('.gantt-label-row').forEach(el => {
      el.style.fontSize = '11px';
      el.style.fontWeight = '700';
      el.style.color = '#334155';
    });
    // 바 영역 상단 여백 확보 (라벨이 잘리지 않도록)
    const barsArea = ganttClone.querySelector('.gantt-bars');
    if (barsArea) {
      const curH = parseInt(barsArea.style.height) || 0;
      barsArea.style.height = (curH + 16) + 'px';
      barsArea.style.paddingTop = '16px';
    }
    const timelineArea = ganttClone.querySelector('.gantt-timeline-area');
    if (timelineArea) {
      const curH = parseInt(timelineArea.style.height) || 0;
      timelineArea.style.height = (curH + 16) + 'px';
    }

    const ganttSec = document.createElement('div');
    ganttSec.style.cssText = 'padding:14px 24px 8px;';
    ganttSec.innerHTML = `<div style="font-size:13px;font-weight:700;color:#334155;
      border-bottom:2px solid #e2e8f0;padding-bottom:8px;margin-bottom:14px;">
      📚 추천 커리큘럼 학습로드맵</div>`;
    ganttSec.appendChild(ganttClone);
    wrap.appendChild(ganttSec);

    // 월별 진도 섹션 (mo-grid 복제)
    const moClone = document.getElementById('mo-grid').cloneNode(true);
    const moSec = document.createElement('div');
    moSec.style.cssText = 'padding:10px 24px 16px;';
    moSec.innerHTML = `<div style="font-size:13px;font-weight:700;color:#334155;
      border-bottom:2px solid #e2e8f0;padding-bottom:8px;margin-bottom:10px;">
      🗓️ 월별 학습 진도</div>`;
    moSec.appendChild(moClone);
    wrap.appendChild(moSec);

    // 푸터
    const today = new Date().toLocaleDateString('ko-KR');
    wrap.insertAdjacentHTML('beforeend', `
      <div style="text-align:center;padding:8px;font-size:10px;color:#94a3b8;
                  border-top:1px solid #e2e8f0;">
        생성일: ${today} &nbsp;·&nbsp; 공인중개사 학습계획 플래너
      </div>`);

    document.body.appendChild(wrap);

    // ── 단일 캡처 ──
    const canvas = await html2canvas(wrap, {
      scale: 2, useCORS: true, logging: false, backgroundColor: '#ffffff'
    });
    document.body.removeChild(wrap);

    // ── A4에 맞게 배치 ──
    const { jsPDF } = window.jspdf;
    const A4_W = 210, A4_H = 297;
    const imgW_mm = A4_W;
    const imgH_mm = imgW_mm * (canvas.height / canvas.width);
    const yOff = imgH_mm < A4_H ? (A4_H - imgH_mm) / 2 : 0;

    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, yOff, imgW_mm,
      Math.min(imgH_mm, A4_H));

    pdf.save(`공인중개사_학습계획_${tLbl}_${S.month}월시작.pdf`);
  } finally {
    btn.innerHTML = orig;
    btn.disabled = false;
  }
}

function saveMyPlanWithFeedback(btn) {
  saveMyPlan();
  btn.style.background = '#10b981';
  btn.style.boxShadow = '0 2px 8px rgba(16,185,129,.35)';
  btn.textContent = '✅ 저장 완료';
  btn.disabled = true;
  setTimeout(() => {
    btn.style.background = 'var(--blue)';
    btn.style.boxShadow = '0 2px 8px rgba(37,99,235,.25)';
    btn.textContent = '💾 나의 학습계획으로 저장하기';
    btn.disabled = false;
  }, 2000);
}

  const container = document.getElementById('right-actions');
  if (!container) return;
  const bannerTop = document.querySelector('.exam-banner').getBoundingClientRect().top;
  container.style.top = Math.max(bannerTop + 8, 20) + 'px';
}
window.addEventListener('scroll', positionMyPlanBtn);
window.addEventListener('resize', positionMyPlanBtn);
